# =============================================
# TravelMate AI - Application Configuration
# =============================================

server:
  port: 8080

spring:
  application:
    name: TravelMateAI-Backend

  # -------------------- Database Configuration --------------------
  datasource:
    url: jdbc:mysql://localhost:3306/travelmateai_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # -------------------- JPA / Hibernate Configuration --------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # -------------------- Email Configuration --------------------
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# -------------------- JWT Configuration --------------------
jwt:
  secret: ${JWT_SECRET}
  expiration: 7200000   # 2 hours (in milliseconds)

# -------------------- Seat Lock Configuration --------------------
seat:
  lock:
    duration-minutes: 5   # Seats are locked for 5 minutes by default
    schedule-rate-ms: 60000   # Scheduler runs every 60 seconds

# -------------------- CORS Configuration --------------------
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4200,http://localhost:8081

# -------------------- Logging Configuration --------------------
logging:
  level:
    root: INFO
    com.travelmateai: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"