# =============================================
# TravelMate AI - Application Configuration
# =============================================

server:
  port: 8080

spring:
  application:
    name: TravelMateAI-Backend

  # -------------------- Database Configuration --------------------
  datasource:
    url: jdbc:mysql://localhost:3306/travelmateai_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # -------------------- JPA / Hibernate Configuration --------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # -------------------- Email Configuration --------------------
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# -------------------- JWT Configuration --------------------
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000   # 24 hours (in milliseconds)

# -------------------- Swagger / OpenAPI Configuration --------------------
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha

# -------------------- Logging Configuration --------------------
logging:
  level:
    root: INFO
    com.travelmateai: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"