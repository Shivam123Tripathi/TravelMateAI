# =============================================
# TravelMate AI - Docker Compose
# Services: MySQL 8.0 + Spring Boot Backend
# =============================================
# Usage:
#   docker-compose up --build        (start all services)
#   docker-compose down              (stop all services)
#   docker-compose down -v           (stop + remove volumes)

services:

  # --- MySQL Database ---
  mysql:
    image: mysql:8.0
    container_name: travelmateai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: travelmateai_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Recommendation ML Service ---
  recommendation:
    build:
      context: ./recommendation-model
      dockerfile: Dockerfile
    container_name: travelmateai-recommendation
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Spring Boot Backend ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travelmateai-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      recommendation:
        condition: service_healthy
    environment:
      # Database
      DB_URL: jdbc:mysql://mysql:3306/travelmateai_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-dGhpc0lzQVZlcnlTZWN1cmVKd3RTZWNyZXRLZXlGb3JUcmF2ZWxNYXRlQUk=}
      # Email (optional — app still works without it)
      MAIL_USERNAME: ${MAIL_USERNAME:-noreply@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-placeholder}
      # Recommendation ML service
      RECOMMENDATION_SERVICE_URL: http://recommendation:5000
      # Spring profile
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"

volumes:
  mysql-data:
    driver: local
