
# Server Settings 
# The port our backend will run on iss
server.port=8080
# Your frontend friend will call APIs on: http://localhost:8080


# --- Database Settings ---
# The URL where MySQL is running
# Format: jdbc:mysql://HOST:PORT/DATABASE_NAME
spring.datasource.url=jdbc:mysql://localhost:3306/travelmateai_db

# Your MySQL username (default is usually 'root')
spring.datasource.username=root

# Your MySQL password (change this to your actual password)
spring.datasource.password=shivam@9039

# The MySQL driver class Spring should use to connect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#  JPA / Hibernate Settings 
# Dialect tells Hibernate which SQL "language" to generate for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# DDL Auto: what to do with the database schema on startup
# 'update' = create tables if they don't exist, update if schema changed

spring.jpa.hibernate.ddl-auto=update

# Show the actual SQL queries in the console (helpful for learning & debugging)
spring.jpa.show-sql=true

# Format the SQL so it's readable in the console 
spring.jpa.properties.hibernate.format_sql=true

# --- App Info ---
spring.application.name=TravelMateAI-Backend
